<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="90" y1="80" x2="1300" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFBFF"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="score" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow2" x="0" y="0" width="1400" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2 2L10 6L2 10V2Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" rx="28" fill="url(#bg2)"/>
  <text x="80" y="88" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Explainable Recommendation Engine</text>
  <text x="80" y="124" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="19">The scoring pipeline combines structured logic with human-readable explanations for TA-job matching.</text>

  <g filter="url(#shadow2)">
    <rect x="88" y="190" width="260" height="470" rx="28" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="122" y="244" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Inputs</text>
    <text x="122" y="292" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">TA profile & skills</text>
    <text x="122" y="330" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Availability slots</text>
    <text x="122" y="368" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Prior experience</text>
    <text x="122" y="406" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Current workload</text>
    <text x="122" y="444" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Job requirements</text>
    <text x="122" y="482" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Preferred skills</text>
    <text x="122" y="520" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Competition pressure</text>
    <text x="122" y="590" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="17">All inputs come from local JSON / TXT / CSV files.</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="430" y="170" width="520" height="520" rx="32" fill="url(#score)"/>
    <text x="474" y="236" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Weighted Scoring Model</text>
    <text x="474" y="286" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="20">Score = 0.50 × SkillMatch + 0.20 × Availability + 0.15 × Experience + 0.15 × WorkloadBalance</text>

    <rect x="472" y="334" width="436" height="74" rx="18" fill="#FFFFFF" fill-opacity="0.16"/>
    <text x="500" y="378" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">1. Match required / preferred skills</text>

    <rect x="472" y="426" width="436" height="74" rx="18" fill="#FFFFFF" fill-opacity="0.16"/>
    <text x="500" y="470" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">2. Check time availability & schedule fit</text>

    <rect x="472" y="518" width="436" height="74" rx="18" fill="#FFFFFF" fill-opacity="0.16"/>
    <text x="500" y="562" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">3. Add experience / CV evidence</text>

    <rect x="472" y="610" width="436" height="74" rx="18" fill="#FFFFFF" fill-opacity="0.16"/>
    <text x="500" y="654" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">4. Penalise overload and high pressure</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="1030" y="190" width="270" height="470" rx="28" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
    <text x="1064" y="244" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Outputs</text>
    <text x="1064" y="294" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Ranked jobs / applicants</text>
    <text x="1064" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Matched skills</text>
    <text x="1064" y="374" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Missing skills</text>
    <text x="1064" y="414" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Workload risk warning</text>
    <text x="1064" y="454" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Competition hint</text>
    <text x="1064" y="494" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="20">Readable explanation text</text>

    <rect x="1062" y="544" width="206" height="82" rx="18" fill="#F5F3FF"/>
    <text x="1090" y="579" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">Visible in TA / MO UI</text>
    <text x="1090" y="607" fill="#7C3AED" font-family="Inter, Arial, sans-serif" font-size="16">Easy to demo in viva</text>
  </g>

  <path d="M348 425H410" stroke="#64748B" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M950 425H1010" stroke="#64748B" stroke-width="4" marker-end="url(#arrow2)"/>

  <rect x="88" y="736" width="1212" height="88" rx="22" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="122" y="784" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Why it matters</text>
  <text x="122" y="816" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">The engine does not just output a score — it explains why a TA fits a role, what skills are missing, and whether workload fairness is at risk.</text>
</svg>
