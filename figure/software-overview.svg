<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1280" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2 2L10 6L2 10V2Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="860" rx="28" fill="url(#bg)"/>

  <text x="80" y="86" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">RecruitAssist Software Overview</text>
  <text x="80" y="122" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="19">A lightweight Java Servlet/JSP coursework system for TA recruitment, explainable recommendations, and workload-aware decision making.</text>

  <rect x="70" y="170" width="1260" height="620" rx="28" fill="#FFFFFF" stroke="#D9E2F2" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="110" y="240" width="240" height="120" rx="24" fill="url(#cardBlue)"/>
    <text x="140" y="290" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Login & Routing</text>
    <text x="140" y="324" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="18">Role-aware entry</text>
    <text x="140" y="350" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="18">TA / MO / Admin</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="200" width="250" height="140" rx="24" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="460" y="246" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">TA Dashboard</text>
    <text x="460" y="280" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Job recommendations</text>
    <text x="460" y="308" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Apply / withdraw</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="380" width="250" height="140" rx="24" fill="#FFFFFF" stroke="#99F6E4" stroke-width="2"/>
    <text x="460" y="426" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">MO Dashboard</text>
    <text x="460" y="460" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Publish / edit jobs</text>
    <text x="460" y="488" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Rank candidates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="560" width="250" height="140" rx="24" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="2"/>
    <text x="460" y="606" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">Admin View</text>
    <text x="460" y="640" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Workload balance</text>
    <text x="460" y="668" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Activity monitoring</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="255" width="270" height="180" rx="26" fill="url(#cardTeal)"/>
    <text x="802" y="308" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Explainable Engine</text>
    <text x="802" y="346" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="18">Skills · availability</text>
    <text x="802" y="374" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="18">Experience · workload</text>
    <text x="802" y="402" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="18">Competition pressure</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="500" width="270" height="180" rx="26" fill="url(#cardPurple)"/>
    <text x="802" y="552" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">File Storage</text>
    <text x="802" y="590" fill="#E9D5FF" font-family="Inter, Arial, sans-serif" font-size="18">JSON / CSV / TXT</text>
    <text x="802" y="618" fill="#E9D5FF" font-family="Inter, Arial, sans-serif" font-size="18">Users · jobs · applications</text>
    <text x="802" y="646" fill="#E9D5FF" font-family="Inter, Arial, sans-serif" font-size="18">Audit trail & config</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1120" y="330" width="160" height="240" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1150" y="382" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Outcomes</text>
    <text x="1150" y="430" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Better fit</text>
    <text x="1150" y="462" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Fairer load</text>
    <text x="1150" y="494" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Clear reasons</text>
    <text x="1150" y="526" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">- Easy demo</text>
  </g>

  <path d="M350 300H410" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M350 300C400 300 380 270 430 270" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M350 300C400 300 380 450 430 450" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M350 300C400 300 380 630 430 630" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <path d="M680 270H740" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M680 450H740" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M680 630H740" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M905 440V485" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1040 345C1090 345 1080 360 1120 360" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1040 590C1095 590 1080 540 1120 540" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="118" y="714" width="1180" height="46" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="150" y="744" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Core flow: role-aware login → task-specific dashboards → explainable decision support → text-file persistence → demo-ready outcomes</text>
</svg>
